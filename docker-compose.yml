# ═══════════════════════════════════════════════════════════════════════════════
# PSEI Authority - Docker Compose (Local Development)
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: psei
      POSTGRES_USER: psei_user
      POSTGRES_PASSWORD: psei_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./psei-service/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psei_user -d psei"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_password_dev
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Ktor Service ───────────────────────────────────────────────────────────
  psei-service:
    build:
      context: ./psei-service
      dockerfile: Dockerfile
    environment:
      - APP_ENV=development
      - PORT=8080
      - DATABASE_URL=jdbc:postgresql://postgres:5432/psei
      - DB_USER=psei_user
      - DB_PASSWORD=psei_password_dev
      - JWT_SECRET=dev-secret-change-in-production-32-chars-minimum
      - REDIS_URL=redis://:redis_password_dev@redis:6379
      - STORAGE_PROVIDER=local
      - STORAGE_PATH=/app/uploads
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Adminer (Database GUI) ─────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  postgres-data:
  redis-data:
  uploads-data:
